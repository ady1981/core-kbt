- name: item_schema
  description: |
    A root item schema.
    Take into account:
    - Any item inherit attribute values of its schema
    - Any item attribute value is idempotent (any overwrite is not allowed)
    - 'extraItemSchemaRules' are rules for ontology items and not for schema ontology items
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters: itemSchemaRules
    - ruleType: hasAttribute
      ruleParameters: kind
      description: 'kind' can be only 'entity' or 'relation'
    - ruleType: hasAttribute
      ruleParameters: schema
      description: The item schema to apply
    - ruleType: hasAttribute
      ruleParameters: extends
      description: It is allowed to extend a schema only
    - ruleType: allowExtraDatatypeAttributes
  itemSchemaRulesExamples: []

## Foundational entity_schema

- name: entity_schema
  extends: item_schema
  kind: entity
  description: A root item schema for entity.
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute:
          oneOf:
            - name
            - constructedNameTemplate
    - ruleType: hasAttribute
      ruleParameters: definition

## Foundational relation_schema

- name: relation_schema
  extends: item_schema
  kind: relation
  description: A root item schema for relation
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute:
          oneOf:
            - name
            - constructedNameTemplate
    - ruleType: hasAttribute
      ruleParameters:
        attribute: domain
        description: The domain entities for this relation
        JSON_Schema:
          type: array
          items:
            type: string
    - ruleType: hasAttribute
      ruleParameters:
        attribute: range
        description: The range entities for this relation
        JSON_Schema:
          type: array
          items:
            type: string
    - ruleType: hasAttribute
      ruleParameters: isTransitive
    - ruleType: hasAttribute
      ruleParameters: isSymmetric
    - ruleType: hasAttribute
      ruleParameters: isFunctional
    - ruleType: hasAttribute
      ruleParameters: isInverseFunctional
    - ruleType: hasAttribute
      ruleParameters:
        attribute: reasoning
        description: Extra reasoning for correct answer
    - ruleType: hasAttribute
      ruleParameters:
        attribute: is_correct
        description: Is this a correct relation of the 'domain' entity to the 'range' entity?
        JSON_Schema:
          type: boolean

## Specified relation ontology schemas

- name: subclassOf_schema
  extends: relation_schema
  description: Describes that the 'domain' entity is a subclass of the 'range' entity
  isTransitive: true
  isSymmetric: false
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute: superclass
        description: Superclass entities. The same values as in the 'range' of this relation
        JSON_Schema:
          type: array
          items:
            type: string
    - ruleType: hasAttribute
      ruleParameters:
        attribute: is_correct
        description: Is the 'domain' a subclass of the 'range'?

- name: partOf_schema
  extends: relation_schema
  description: Describes compositional (including spatial and non-spatial) relationship of the 'domain' entity to the 'range' entity
  isSymmetric: false
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute: wholeClass
        description: The whole class entities. The same values as in the 'range' of this relation
        JSON_Schema:
          type: array
          items:
            type: string
    - ruleType: hasAttribute
      ruleParameters:
        attribute: is_correct
        description: Is the 'domain' a part of the 'range'?

- name: instanceOf_schema
  extends: relation_schema
  description: Describes that the 'domain' entity is an instance of the 'range' entity
  isTransitive: false
  isSymmetric: false
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute: is_correct
        description: Is the 'domain' is an instance of the 'range'?

- name: sameIdentityAs_schema
  extends: relation_schema
  description: Describes that the 'domain' term is same as the 'range' term and both correspond to the same concept or instance
  isSymmetric: true
  isTransitive: true
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute: is_correct
        description: Is the 'domain' a synonym to the 'range'?
