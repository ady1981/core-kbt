- name: item_schema
  description: |
    A root item schema.
    Take into account:
    - Any item inherit attribute values of its schema. 
    - Any item attribute value is idempotent (any overwrite is not allowed).
    - 'extraItemSchemaRules' are rules for ontology items and not for schema ontology items
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters: itemSchemaRules
    - ruleType: hasAttribute
      ruleParameters: kind
      description: 'kind' can be only 'entity' or 'relation'
    - ruleType: hasAttribute
      ruleParameters: schema
      description: The item schema to apply
    - ruleType: hasAttribute
      ruleParameters: extends
      description: It is allowed to extend a schema only
    - ruleType: allowExtraDatatypeAttributes
  itemSchemaRulesExamples: []

## Foundational entity_schema

- name: entity_schema
  extends: item_schema
  kind: entity
  description: A root item schema for entity.
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute:
          oneOf:
            - name
            - constructedNameTemplate
    - ruleType: hasAttribute
      ruleParameters: definition

## Foundational relation_schema

- name: relation_schema
  extends: item_schema
  kind: relation
  description: A root item schema for relation
  extraItemSchemaRules:
    - ruleType: hasAttribute
      ruleParameters:
        attribute:
          oneOf:
            - name
            - constructedNameTemplate
    - ruleType: hasAttribute
      ruleParameters:
        attribute: domainEntities
        JSON_Schema:
          type: array
          items:
            type: string
            description: Entity name
    - ruleType: hasAttribute
      ruleParameters:
        attribute: rangeEntities
        JSON_Schema:
          type: array
          items:
            type: string
            description: Entity name
    - ruleType: hasAttribute
      ruleParameters: isTransitive
    - ruleType: hasAttribute
      ruleParameters: isSymmetric
    - ruleType: hasAttribute
      ruleParameters: isFunctional
    - ruleType: hasAttribute
      ruleParameters: isInverseFunctional
    - ruleType: hasAttribute
      ruleParameters:
        attribute: reasoning
        description: Extra reasoning for correct answer
    - ruleType: hasAttribute
      ruleParameters:
        attribute: is_correct
        description: Is this a correct relation from "domain" entity to "range" entity?
        JSON_Schema:
          type: boolean

## Specified relation ontology schemas

- name: subclassOf_schema
  extends: relation_schema
  description: Describes that "domain" entity is a subclass of "range" entity
  isTransitive: true
  isSymmetric: false

- name: partOf_schema
  extends: relation_schema
  description: Describes structural (including spatial and non-spatial) relationship of "domain" entity to "range" entity
  isSymmetric: false

- name: instanceOf_schema
  extends: relation_schema
  description: Describes that "domain" entity is instance of "range" entity
  isTransitive: false
  isSymmetric: false

- name: sameAs_schema
  extends: relation_schema
  description: Describes that the "domain" term is same as "range" term and both correspond to the same concept or instance
  isSymmetric: true
  isTransitive: true
