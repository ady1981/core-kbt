type: object
properties:
  items:
    type: array
    items:
      type: object
      properties:
        context_knowledge_topic:
          type: string
        answer_text:
          type: string
        answer_references:
          type: array
          items:
            type: object
            properties:
              reference_type:
                type: string
                enum:
                  - URI_href
                  - citation_ref
                  - internal_knowledge
              reference_text:
                type: string
                description: |
                  ```yaml
                  examples:
                  - https://example.com
                  - <Authors> (<Year>). <Title>. <Other details>.
                  - A general sense fact
                  ```
  other_notes:
    type: string
